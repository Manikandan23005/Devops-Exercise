name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'Exercise-23/**'
  pull_request:
    branches:
      - main
    paths:
      - 'Exercise-23/**'

jobs:
  test-and-scan:
    name: Test & Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Exercise-23
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'Exercise-23/app/requirements.txt'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run Unit Tests
        run: |
          python -m pytest -v

      - name: Run Bandit Security Scan
        run: |
          bandit -r app/

  build-and-push:
    name: Build & Push to Amazon ECR
    needs: test-and-scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: Exercise-23
          file: Exercise-23/docker/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops:
    name: Update GitOps Repository
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: Exercise-23
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update Kubernetes Manifest Tag
        run: |
          # Simulating GitOps deployment tag updates
          sed -i "s|image: .*|image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}|g" k8s/deployment.yaml

      - name: Push to GitOps Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "gitops: update flask-app image tag to ${GITHUB_SHA::7}"
          
          # Push to the repository using GITOPS_TOKEN
          git remote set-url origin https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin main
