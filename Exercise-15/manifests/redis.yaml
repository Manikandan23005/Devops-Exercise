apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-db
  namespace: prod-outage
  labels:
    app: redis-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-db
  template:
    metadata:
      labels:
        app: redis-db
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        command:
        - redis-server
        - --requirepass
        - new-password
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: prod-outage
spec:
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: redis-db
