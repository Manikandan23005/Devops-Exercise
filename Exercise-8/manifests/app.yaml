apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-app
  namespace: egress-lab
  labels:
    app: payment-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-app
  template:
    metadata:
      labels:
        app: payment-app
    spec:
      hostAliases:
      - ip: "198.51.100.1"
        hostnames:
        - "dynamodb.ap-south-1.amazonaws.com"
      containers:
      - name: app
        image: python:3.10-slim
        command:
        - python3
        - -c
        - |
          import socket
          import time
          import sys

          # Install curl first to support manual troubleshooting steps
          import subprocess
          print("INFO: Installing curl for diagnostic support...", flush=True)
          subprocess.run(["apt-get", "update"], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
          subprocess.run(["apt-get", "install", "-y", "curl"], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
          print("INFO: Curl installed successfully. Starting DynamoDB loop.", flush=True)

          while True:
              print("INFO: Querying AWS DynamoDB at dynamodb.ap-south-1.amazonaws.com...", flush=True)
              try:
                  # Attempt a direct TCP connection on port 443 with a 3-second timeout
                  socket.create_connection(("dynamodb.ap-south-1.amazonaws.com", 443), timeout=3)
                  print("INFO: Successfully connected to DynamoDB.", flush=True)
              except socket.timeout:
                  print("ERROR: Connection timeout when querying dynamodb.ap-south-1.amazonaws.com:443", file=sys.stderr, flush=True)
              except Exception as e:
                  print(f"ERROR: Connection failed: {e}", file=sys.stderr, flush=True)
              time.sleep(10)
