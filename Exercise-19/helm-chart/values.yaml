# Default values for python-app.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: python-app
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "1.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: python-app.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: python-app-tls
  #    hosts:
  #      - python-app.local

resources:
  # We will define requests/limits. In the default configuration:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# ConfigMap values
configData:
  APP_ENV: "dev"
  APP_MESSAGE: "Welcome to the production-ready Python App!"

# Secret values (will be encoded base64 in the secret.yaml)
secretData:
  API_KEY: "dev-api-key-12345"
  DB_PASSWORD: "dev-db-password-secure"

# NetworkPolicy configurations
networkPolicy:
  enabled: true
  # Allow traffic from ingress controllers or specific namespaces
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0

# PodDisruptionBudget configurations
pdb:
  enabled: true
  minAvailable: 1
