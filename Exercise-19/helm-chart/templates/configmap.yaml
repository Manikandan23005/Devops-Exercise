apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "python-app.fullname" . }}-config
  labels:
    {{- include "python-app.labels" . | nindent 4 }}
data:
  {{- if .Values.configData }}
  {{- range $key, $value := .Values.configData }}
  {{ $key }}: {{ tpl $value $ | quote }}
  {{- end }}
  {{- else }}
  APP_ENV: "default"
  {{- end }}
