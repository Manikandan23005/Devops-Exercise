apiVersion: v1
kind: Secret
metadata:
  name: {{ include "python-app.fullname" . }}-secret
  labels:
    {{- include "python-app.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secretData }}
  {{- range $key, $value := .Values.secretData }}
  {{ $key }}: {{ tpl $value $ | b64enc | quote }}
  {{- end }}
  {{- else }}
  API_KEY: {{ "defaultkey" | b64enc | quote }}
  {{- end }}
