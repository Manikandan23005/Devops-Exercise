apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secret-store
  namespace: exercise-4
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-secret-1
            key: access-key
          secretAccessKeySecretRef:
            name: aws-secret-1
            key: secret-access-key