apiVersion: v1
kind: ServiceAccount
metadata:
  name: alb-controller-sa
  namespace: alb-failure-lab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: alb-controller-role
  namespace: alb-failure-lab
rules:
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alb-controller-rb
  namespace: alb-failure-lab
subjects:
- kind: ServiceAccount
  name: alb-controller-sa
  namespace: alb-failure-lab
roleRef:
  kind: Role
  name: alb-controller-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aws-load-balancer-controller
  namespace: alb-failure-lab
  labels:
    app: aws-load-balancer-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aws-load-balancer-controller
  template:
    metadata:
      labels:
        app: aws-load-balancer-controller
    spec:
      serviceAccountName: alb-controller-sa
      containers:
      - name: controller
        image: python:3.10-slim
        command:
        - python3
        - -c
        - |
          import ssl
          import urllib.request
          import json
          import time
          import sys

          # Create warning event in Kubernetes
          context = ssl.create_default_context()
          context.load_verify_locations('/var/run/secrets/kubernetes.io/serviceaccount/ca.crt')

          with open('/var/run/secrets/kubernetes.io/serviceaccount/token', 'r') as f:
              token = f.read().strip()

          event = {
              "apiVersion": "v1",
              "kind": "Event",
              "metadata": {
                  "generateName": "payment-app-ingress-event-",
                  "namespace": "alb-failure-lab"
              },
              "involvedObject": {
                  "apiVersion": "networking.k8s.io/v1",
                  "kind": "Ingress",
                  "name": "payment-app-ingress",
                  "namespace": "alb-failure-lab"
              },
              "reason": "TargetRegistrationFailed",
              "message": "Target registration failed: unable to register target IPs with AWS Target Group due to subnet discovery failure",
              "type": "Warning",
              "source": {
                  "component": "aws-load-balancer-controller"
              },
              "firstTimestamp": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "lastTimestamp": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "count": 1
          }

          url = "https://kubernetes.default.svc/api/v1/namespaces/alb-failure-lab/events"
          req = urllib.request.Request(url, data=json.dumps(event).encode(), headers={
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json"
          })
          
          # Try to post event, wait a bit in case ingress is creating
          time.sleep(2)
          for i in range(5):
              try:
                  with urllib.request.urlopen(req, context=context) as response:
                      print("Created TargetRegistrationFailed warning event on Ingress.", flush=True)
                      break
              except Exception as e:
                  print(f"Waiting for Ingress resource to be ready: {e}", file=sys.stderr, flush=True)
                  time.sleep(2)

          # Loop and print controller error logs
          while True:
              print("E0702 11:20:00.000000 1 controller.go:102] Unable to discover subnets for ALB. Ensure public subnets are tagged with kubernetes.io/role/elb=1.", flush=True)
              print("W0702 11:20:05.000000 1 controller.go:155] Target registration failed for payment-app-ingress: target-type ip requires subnet discovery to configure AWS target groups.", flush=True)
              time.sleep(10)
