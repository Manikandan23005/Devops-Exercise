
autoDiscovery:
  clusterName: production-eks

awsRegion: ap-south-1

rbac:
  create: true
  serviceAccount:
    create: true
    name: cluster-autoscaler
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::028987315631:role/eks-cluster-autoscaler-role

extraArgs:
  balance-similar-node-groups: true
  skip-nodes-with-system-pods: false
  skip-nodes-with-local-storage: false
  expander: least-waste
  v: 4

replicaCount: 1

resources:
  limits:
    cpu: 100m
    memory: 600Mi
  requests:
    cpu: 100m
    memory: 300Mi
