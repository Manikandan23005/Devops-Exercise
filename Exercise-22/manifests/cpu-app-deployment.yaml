apiVersion: v1
kind: ConfigMap
metadata:
  name: cpu-app-code
  namespace: exercise22
data:
  app.py: |
    import time
    import math
    import os
    from flask import Flask, jsonify, request

    app = Flask(__name__)

    @app.route('/healthz', methods=['GET'])
    def healthz():
        return "OK", 200

    @app.route('/', methods=['GET'])
    def status():
        return jsonify({
            "status": "healthy",
            "app": "cpu-intensive-service"
        })

    @app.route('/load', methods=['GET'])
    def generate_load():
        duration = float(request.args.get('duration', 10.0))
        iterations = int(request.args.get('iterations', 1000000))
        
        start_time = time.time()
        count = 0
        while (time.time() - start_time) < duration:
            x = math.sqrt(math.pi * iterations)
            y = math.sin(x) * math.cos(x)
            count += 1
            
        end_time = time.time()
        
        return jsonify({
            "message": "CPU load generation finished",
            "elapsed_seconds": round(end_time - start_time, 4),
            "calculations_performed": count
        })

    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=8080)

  requirements.txt: |
    Flask==3.0.3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-load-app
  namespace: exercise22
  labels:
    app: cpu-load-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cpu-load-app
  template:
    metadata:
      labels:
        app: cpu-load-app
    spec:
      initContainers:
      - name: install-deps
        image: python:3.11-alpine
        command: ["pip", "install", "-r", "/config/requirements.txt", "--target", "/app/libs"]
        volumeMounts:
        - name: code-volume
          mountPath: /config
        - name: libs-volume
          mountPath: /app/libs
      containers:
      - name: app
        image: python:3.11-alpine
        command: ["sh", "-c", "PYTHONPATH=/app/libs python /config/app.py"]
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: code-volume
          mountPath: /config
        - name: libs-volume
          mountPath: /app/libs
      volumes:
      - name: code-volume
        configMap:
          name: cpu-app-code
      - name: libs-volume
        emptyDir: {}
