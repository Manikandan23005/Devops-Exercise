apiVersion: v1
kind: ConfigMap
metadata:
  name: cpu-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  cpu-dashboard.json: |
    {
      "editable": true,
      "id": null,
      "panels": [
        {
          "id": 1,
          "title": "Pod CPU Utilization Rate (5m average)",
          "type": "timeseries",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "Prometheus"},
              "expr": "sum(rate(container_cpu_usage_seconds_total{container!=\"\", namespace!=\"\"}[5m])) by (pod, namespace)",
              "legendFormat": "{{namespace}} / {{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit"
            }
          }
        }
      ],
      "title": "K8s Pod CPU Dashboard",
      "schemaVersion": 38,
      "version": 1
    }
---
