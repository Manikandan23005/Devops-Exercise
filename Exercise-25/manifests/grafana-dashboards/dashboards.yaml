apiVersion: v1
kind: ConfigMap
metadata:
  name: error-rate-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  error-rate-dashboard.json: |
    {
      "editable": true,
      "id": null,
      "panels": [
        {
          "id": 1,
          "title": "Error Rate (HTTP 5xx responses/sec)",
          "type": "timeseries",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "Prometheus"},
              "expr": "sum(rate(http_requests_total{status=~\"5..\"}[5m])) by (service, namespace) OR sum(rate(nginx_ingress_controller_requests{status=~\"5..\"}[5m])) by (ingress, namespace)",
              "legendFormat": "{{namespace}} / {{service}}{{ingress}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "pps"
            }
          }
        }
      ],
      "title": "K8s Service Error Rate Dashboard",
      "schemaVersion": 38,
      "version": 1
    }
---
