# Helm values for Prometheus Server
# Reference: https://github.com/prometheus-community/helm-charts/tree/main/charts/prometheus

server:
  replicaCount: 1
  
  # Configure persistent storage
  persistentVolume:
    enabled: true
    size: 10Gi
    storageClass: gp2

  # Prometheus scrape configurations
  extraScrapeConfigs: |
    # Scrape pod metrics automatically if they have the scrape annotations
    - job_name: 'kubernetes-pods'
      kubernetes_sd_configs:
      - role: pod
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name

    # Scrape Grafana Alloy metrics
    - job_name: 'alloy'
      static_configs:
      - targets: ['alloy.observability.svc.cluster.local:12345']

# Disable components we don't need for this exercise
alertmanager:
  enabled: false
prometheus-pushgateway:
  enabled: false
