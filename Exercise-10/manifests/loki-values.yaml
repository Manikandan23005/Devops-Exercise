deploymentMode: SingleBinary

loki:
  auth_enabled: true # Enforces X-Scope-OrgID header validation, triggering 403 errors if missing
  
  commonConfig:
    replication_factor: 1
  
  schemaConfig:
    configs:
      - from: "2024-01-01"
        index:
          period: 24h
          prefix: loki_index_
        object_store: filesystem
        schema: v13
        store: tsdb

  storage:
    type: filesystem
    filesystem:
      chunks_directory: /var/loki/chunks
      rules_directory: /var/loki/rules

singleBinary:
  replicas: 1
  persistence:
    enabled: false # Keep it lightweight for local sandbox testing
