apiVersion: v1
kind: ConfigMap
metadata:
  name: customer-app-code
  namespace: exercise24
data:
  app.py: |
    import os
    import logging
    from flask import Flask, jsonify, request
    import boto3
    from botocore.exceptions import ClientError

    app = Flask(__name__)

    logging.basicConfig(level=logging.INFO)
    logger = logging.getLogger(__name__)

    TABLE_NAME = os.environ.get("DYNAMODB_TABLE", "exercise24-customers")
    AWS_REGION = os.environ.get("AWS_REGION", "ap-south-1")

    try:
        dynamodb = boto3.resource("dynamodb", region_name=AWS_REGION)
        table = dynamodb.Table(TABLE_NAME)
        logger.info(f"Connected to table '{TABLE_NAME}' in region '{AWS_REGION}'.")
    except Exception as e:
        logger.error(f"Error initializing DynamoDB: {str(e)}")
        table = None

    @app.route("/healthz", methods=["GET"])
    def healthz():
        return "OK", 200

    @app.route("/", methods=["GET"])
    def index():
        return jsonify({
            "status": "healthy",
            "service": "customer-api",
            "target_table": TABLE_NAME,
            "region": AWS_REGION
        })

    @app.route("/customer", methods=["POST"])
    def create_customer():
        if not table:
            return jsonify({"error": "DynamoDB table not initialized"}), 500
        data = request.get_json()
        if not data or "id" not in data or "name" not in data:
            return jsonify({"error": "Missing required fields: id and name"}), 400
        try:
            table.put_item(
                Item={
                    "id": str(data["id"]),
                    "name": str(data["name"]),
                    "email": data.get("email", ""),
                    "phone": data.get("phone", "")
                }
            )
            return jsonify({"message": "Customer created successfully", "customer": data}), 201
        except ClientError as e:
            return jsonify({"error": e.response["Error"]["Message"]}), 500

    @app.route("/customer/<id>", methods=["GET"])
    def get_customer(id):
        if not table:
            return jsonify({"error": "DynamoDB table not initialized"}), 500
        try:
            response = table.get_item(Key={"id": str(id)})
            item = response.get("Item")
            if not item:
                return jsonify({"error": "Customer not found"}), 404
            return jsonify(item), 200
        except ClientError as e:
            return jsonify({"error": e.response["Error"]["Message"]}), 500

    @app.route("/customer/<id>", methods=["PUT"])
    def update_customer(id):
        if not table:
            return jsonify({"error": "DynamoDB table not initialized"}), 500
        data = request.get_json()
        if not data:
            return jsonify({"error": "No update fields provided"}), 400
        
        update_expr_parts = []
        expr_attr_vals = {}
        expr_attr_names = {}
        
        for field in ["name", "email", "phone"]:
            if field in data:
                placeholder_name = f"#f_{field}"
                placeholder_val = f":v_{field}"
                update_expr_parts.append(f"{placeholder_name} = {placeholder_val}")
                expr_attr_names[placeholder_name] = field
                expr_attr_values[placeholder_val] = str(data[field])
                
        if not update_expr_parts:
            return jsonify({"error": "No valid fields to update"}), 400
            
        try:
            response = table.update_item(
                Key={"id": str(id)},
                UpdateExpression="SET " + ", ".join(update_expr_parts),
                ExpressionAttributeNames=expr_attr_names,
                ExpressionAttributeValues=expr_attr_values,
                ReturnValues="ALL_NEW"
            )
            return jsonify({"message": "Customer updated successfully", "customer": response.get("Attributes")}), 200
        except ClientError as e:
            return jsonify({"error": e.response["Error"]["Message"]}), 500

    if __name__ == "__main__":
        app.run(host="0.0.0.0", port=5000)

  requirements.txt: |
    Flask==3.0.3
    boto3==1.34.131
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-app
  namespace: exercise24
  labels:
    app: customer-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-app
  template:
    metadata:
      labels:
        app: customer-app
    spec:
      serviceAccountName: customer-sa
      initContainers:
      - name: install-deps
        image: python:3.11-alpine
        command: ["pip", "install", "-r", "/config/requirements.txt", "--target", "/app/libs"]
        volumeMounts:
        - name: code-volume
          mountPath: /config
        - name: libs-volume
          mountPath: /app/libs
      containers:
      - name: app
        image: python:3.11-alpine
        command: ["sh", "-c", "PYTHONPATH=/app/libs python /config/app.py"]
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: DYNAMODB_TABLE
          value: "exercise24-customers"
        - name: AWS_REGION
          value: "ap-south-1"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /healthz
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: code-volume
          mountPath: /config
        - name: libs-volume
          mountPath: /app/libs
      volumes:
      - name: code-volume
        configMap:
          name: customer-app-code
      - name: libs-volume
        emptyDir: {}
