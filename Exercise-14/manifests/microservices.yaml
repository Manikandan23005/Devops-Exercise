apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: tracing-lab
  labels:
    app: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: python:3.10-slim
        ports:
        - containerPort: 8080
        command:
        - python3
        - -c
        - |
          import http.server
          import socketserver
          import time
          import sys
          import json

          class PaymentHandler(http.server.SimpleHTTPRequestHandler):
              def do_POST(self):
                  if self.path == "/pay":
                      start_time = time.time()
                      print("INFO: Initiating payment authorization request...", flush=True)
                      
                      # Introduce artificial delay of 4.2 seconds simulating a slow database lock or slow external gateway response
                      print("DEBUG: Slow SQL query: SELECT * FROM transaction_locks WHERE account_id = 14892 (simulating lock wait)...", file=sys.stderr, flush=True)
                      time.sleep(4.2)
                      
                      latency = time.time() - start_time
                      print(f"WARN: External gateway payment verification took {latency:.2f} seconds (api.stripe.com/v1/charges)", file=sys.stderr, flush=True)
                      
                      self.send_response(200)
                      self.send_header("Content-Type", "application/json")
                      self.end_headers()
                      self.wfile.write(json.dumps({
                          "payment_status": "authorized",
                          "payment_latency": round(latency, 2)
                      }).encode())
                  else:
                      self.send_response(404)
                      self.end_headers()

          socketserver.TCPServer.allow_reuse_address = True
          with socketserver.TCPServer(("", 8080), PaymentHandler) as httpd:
              print("Payment service starting on port 8080...", flush=True)
              httpd.serve_forever()
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: tracing-lab
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: payment-service
