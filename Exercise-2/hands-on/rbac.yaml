apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: serviceaccount-reader
  namespace: customer-app
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: customer-sa-read-sa
  namespace: customer-app
subjects:
  - kind: ServiceAccount
    name: customer-sa
    namespace: customer-app
roleRef:
  kind: Role
  name: serviceaccount-reader
  apiGroup: rbac.authorization.k8s.io
