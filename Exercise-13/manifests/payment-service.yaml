apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: secret-outage
  labels:
    app: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: python:3.10-slim
        ports:
        - containerPort: 8080
        env:
        - name: PAYMENT_TOKEN
          valueFrom:
            secretKeyRef:
              name: payment-secret
              key: PAYMENT_TOKEN
        command:
        - python3
        - -c
        - |
          import http.server
          import socketserver
          import os
          import sys
          import json

          class PaymentHandler(http.server.SimpleHTTPRequestHandler):
              def do_POST(self):
                  if self.path == "/pay":
                      auth_header = self.headers.get("Authorization", "")
                      expected_token = os.environ.get("PAYMENT_TOKEN", "")
                      
                      # The client is sending the new rotated token, but the app has the old token
                      client_token = auth_header.replace("Bearer ", "").strip()
                      
                      if client_token == "new-rotated-token" and expected_token != "new-rotated-token":
                          print(f"ERROR: Token validation failed: Client sent new-rotated-token but server only has un-rotated key.", file=sys.stderr, flush=True)
                          self.send_response(401)
                          self.send_header("Content-Type", "application/json")
                          self.end_headers()
                          self.wfile.write(json.dumps({"error": "Unauthorized", "message": "Token validation failed"}).encode())
                      elif client_token == expected_token:
                          print("INFO: Token validation successful. Payment processed.", flush=True)
                          self.send_response(200)
                          self.send_header("Content-Type", "application/json")
                          self.end_headers()
                          self.wfile.write(json.dumps({"status": "success", "transaction_id": "tx_998877"}).encode())
                      else:
                          print("ERROR: Token validation failed: Invalid or missing token.", file=sys.stderr, flush=True)
                          self.send_response(401)
                          self.send_header("Content-Type", "application/json")
                          self.end_headers()
                          self.wfile.write(json.dumps({"error": "Unauthorized"}).encode())
                  else:
                      self.send_response(404)
                      self.end_headers()

          socketserver.TCPServer.allow_reuse_address = True
          with socketserver.TCPServer(("", 8080), PaymentHandler) as httpd:
              print("Payment service starting on port 8080...", flush=True)
              httpd.serve_forever()
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: secret-outage
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: payment-service
