name: payment-service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "Exercise-1/app/**"
      - "Exercise-1/helm/**"
      - "Exercise-1/.github/workflows/**"

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 028987315631.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: payment-service

jobs:
  # ─── Job 1: Unit Tests ──────────────────────────────────────────────────────
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest

      - name: Run unit tests
        run: |
          cd app
          pytest tests/ -v

  # ─── Job 2: Build, Push & Deploy ────────────────────────────────────────────
  build-push-deploy:
    name: Build → Push → Helm Update
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write          # allow git push back to repository
      id-token: write          # OIDC for AWS auth

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── AWS Auth ────────────────────────────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::028987315631:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      # ── Login to ECR ────────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build Docker Image ──────────────────────────────────────────────────
      - name: Build Docker image
        run: |
          IMAGE_TAG="${{ github.sha }}"
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            ./Exercise-1/app

      # ── Push to ECR ─────────────────────────────────────────────────────────
      - name: Push image to Amazon ECR
        run: |
          IMAGE_TAG="${{ github.sha }}"
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # ── Update Helm values.yaml ─────────────────────────────────────────────
      - name: Update Helm image tag
        run: |
          sed -i "s/tag: .*/tag: $IMAGE_TAG/" Exercise-1/helm/payment-service/values.yaml

      # ── Commit updated values.yaml back to Git ──────────────────────────────
      - name: Commit Helm values back to Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Exercise-1/helm/payment-service/values.yaml
          git commit -m "chore: update image tag to $IMAGE_TAG [skip ci]"
          git push
