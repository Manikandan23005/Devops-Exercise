apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payment-service
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Manikandan23005/Devops-Exercise.git
    targetRevision: HEAD
    path: Exercise-1/helm/payment-service
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: payment

  syncPolicy:
    automated:
      prune: true       # Delete resources removed from Git
      selfHeal: true    # Auto-revert manual kubectl changes
    syncOptions:
      - CreateNamespace=true
