# External Secrets Operator – SecretStore
# Points to AWS Secrets Manager in ap-south-1 using IRSA credentials.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secret-store
  namespace: payment
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: payment-service-sa
