apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: exercise-23
  labels:
    app: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
        - name: flask-app
          image: .dkr.ecr.us-east-1.amazonaws.com/flask-app:47c9f727238d7ad5904612b8e75ba33f711593b5
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: APP_ENV
              value: "production"
            - name: APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flask-app-secrets
                  key: APP_PASSWORD
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
