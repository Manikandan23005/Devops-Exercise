apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-secret
  namespace: exercise20
spec:
  refreshInterval: 1m

  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore

  target:
    name: app-secret

  data:
    - secretKey: DB_USERNAME
      remoteRef:
        key: exercise20-app-secret
        property: DB_USERNAME

    - secretKey: DB_PASSWORD
      remoteRef:
        key: exercise20-app-secret
        property: DB_PASSWORD

    - secretKey: JWT_SECRET
      remoteRef:
        key: exercise20-app-secret
        property: JWT_SECRET
